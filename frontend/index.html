<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="orange">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chhaperia ERP — Tape & Insulation Manufacturing Suite</title>
  <meta name="description" content="Chhaperia Cable Material ERP — inventory, production, procurement & sales with automated stock, usage and pending calculations." />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css?v=5" />
  <link rel="stylesheet" href="css/app.css?v=9" />
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-mark">
      <img src="assets/mark.png" alt="Chhaperia" />
    </div>
    <div class="splash-bar"><span></span></div>
    <div class="splash-text">CHHAPERIA&nbsp;ERP</div>
  </div>

  <!-- Login gate -->
  <div id="login" class="login-screen" hidden>
    <div class="login-card">
      <img src="assets/logo-full.png" class="login-logo" alt="Chhaperia" />
      <div class="login-title">Production &amp; ERP Suite</div>
      <div class="login-sub">Sign in to continue</div>
      <form id="loginForm" class="login-form" autocomplete="on">
        <label class="login-field">
          <span>Username</span>
          <input id="loginUser" type="text" autocomplete="username" placeholder="e.g. admin" required />
        </label>
        <label class="login-field">
          <span>Password</span>
          <input id="loginPass" type="password" autocomplete="current-password" placeholder="Your password" required />
        </label>
        <div id="loginError" class="login-error" hidden></div>
        <button type="submit" id="loginBtn" class="login-btn">Sign In</button>
      </form>
      <div class="login-foot">Chhaperia Cable Material Pvt. Ltd.</div>
    </div>
  </div>

  <div id="app" class="app-shell" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="assets/logo-full.png" class="brand-logo-full" alt="Chhaperia" />
        <img src="assets/mark.png" class="brand-logo-mark" alt="Chhaperia" />
      </div>
      <nav class="nav" id="nav"><!-- nav injected --></nav>
      <div class="sidebar-foot">
        <div class="org-card">
          <div class="org-dot"></div>
          <div>
            <div class="org-name" id="orgName">Chhaperia</div>
            <div class="org-sub" id="orgSub">Loading…</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" title="Menu" aria-label="Toggle navigation menu">☰</button>
        <div class="crumbs" id="crumbs"></div>
        <div class="topbar-spacer"></div>
        <button class="search-trigger" id="searchTrigger">
          <span class="si">⌕</span><span>Search anything…</span><kbd>Ctrl K</kbd>
        </button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark theme">◐</button>
        <div class="accent-pop">
          <button class="icon-btn" id="accentToggle" title="Accent color" aria-label="Choose accent colour">🎨</button>
          <div class="accent-menu" id="accentMenu" hidden>
            <div class="accent-title">Accent</div>
            <div class="swatches" id="swatches"></div>
            <label class="auto-accent">
              <input type="checkbox" id="autoAccent" /> Auto-cycle by module
            </label>
          </div>
        </div>
        <button class="icon-btn bell" id="bellBtn" title="Alerts" aria-label="View alerts">
          🔔<span class="badge" id="bellBadge" hidden>0</span>
        </button>
        <div class="user-chip">
          <div class="avatar" id="userAvatar"></div>
          <div class="user-meta">
            <div class="user-name" id="userName">User</div>
            <div class="user-role" id="userRole"></div>
          </div>
          <button class="icon-btn" id="logoutBtn" title="Sign out" aria-label="Sign out" style="margin-left:6px">⏻</button>
        </div>
      </header>

      <main class="view" id="view"><!-- module injected --></main>
    </div>
  </div>

  <!-- Notifications drawer -->
  <div class="drawer" id="alertDrawer" hidden>
    <div class="drawer-head">
      <h3>Alerts &amp; Notifications</h3>
      <button class="icon-btn" id="closeDrawer">✕</button>
    </div>
    <div class="drawer-body" id="alertList"></div>
  </div>
  <div class="scrim" id="scrim" hidden></div>

  <!-- Command palette -->
  <div class="cmdk" id="cmdk" hidden>
    <div class="cmdk-box">
      <input id="cmdkInput" placeholder="Jump to a module, item, order…" autocomplete="off" />
      <div class="cmdk-results" id="cmdkResults"></div>
      <div class="cmdk-foot"><kbd>↑↓</kbd> navigate <kbd>enter</kbd> open <kbd>esc</kbd> close</div>
    </div>
  </div>

  <!-- Modal host -->
  <div class="modal-host" id="modalHost" hidden></div>

  <!-- Toasts -->
  <div class="toast-stack" id="toasts"></div>

  <script src="js/data.js?v=9"></script>
  <script src="js/engine.js?v=13"></script>
  <script src="js/charts.js?v=9"></script>
  <script src="js/ui.js?v=9"></script>
  <script src="js/mod-common.js?v=11"></script>
  <script src="js/csvio.js?v=9"></script>
  <script src="js/mod-overview.js?v=9"></script>
  <script src="js/mod-inventory.js?v=16"></script>
  <script src="js/mod-production.js?v=10"></script>
  <script src="js/mod-trade.js?v=10"></script>
  <script src="js/mod-crm.js?v=9"></script>
  <script src="js/mod-hr.js?v=1"></script>
  <script src="js/mod-dispatch.js?v=1"></script>
  <script src="js/mod-reports.js?v=9"></script>
  <script src="js/mod-users.js?v=9"></script>
  <script src="js/mod-supervisor.js?v=10"></script>
  <script src="js/app.js?v=13"></script>
</body>
</html>
